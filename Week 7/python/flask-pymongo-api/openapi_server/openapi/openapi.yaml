openapi: 3.0.0
info:
  description: API quản lý sản phẩm bằng Python/Flask và MongoDB
  title: Product Management API
  version: 1.0.0
servers:
- description: Local server
  url: http://localhost:8080
paths:
  /products:
    get:
      operationId: products_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_ListProducts"
          description: Lấy danh sách thành công
      summary: Lấy danh sách toàn bộ sản phẩm
      tags:
      - Products
      x-openapi-router-controller: openapi_server.controllers.products_controller
    post:
      operationId: products_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_SingleProduct"
          description: Tạo thành công
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
      summary: Thêm sản phẩm mới
      tags:
      - Products
      x-openapi-router-controller: openapi_server.controllers.products_controller
  /products/{id}:
    delete:
      operationId: products_id_delete
      parameters:
      - description: ID của sản phẩm (Chuỗi ObjectId của MongoDB)
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_DeletedProduct"
          description: Xóa thành công
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Không tìm thấy
      summary: Xóa sản phẩm
      tags:
      - Products
      x-openapi-router-controller: openapi_server.controllers.products_controller
    get:
      operationId: products_id_get
      parameters:
      - description: ID của sản phẩm (Chuỗi ObjectId của MongoDB)
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_SingleProduct"
          description: Thành công
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Không tìm thấy
      summary: Lấy chi tiết sản phẩm
      tags:
      - Products
      x-openapi-router-controller: openapi_server.controllers.products_controller
    put:
      operationId: products_id_put
      parameters:
      - description: ID của sản phẩm (Chuỗi ObjectId của MongoDB)
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_SingleProduct"
          description: Cập nhật thành công
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Không tìm thấy
      summary: Cập nhật sản phẩm
      tags:
      - Products
      x-openapi-router-controller: openapi_server.controllers.products_controller
components:
  schemas:
    Product:
      example:
        price: 1500
        name: Laptop Dell XPS
        id: 645a1b8e9d8f4c2a1b9e7d6c
        category: Electronics
      properties:
        id:
          example: 645a1b8e9d8f4c2a1b9e7d6c
          title: id
          type: string
        name:
          example: Laptop Dell XPS
          title: name
          type: string
        price:
          example: 1500
          title: price
          type: number
        category:
          example: Electronics
          title: category
          type: string
      title: Product
      type: object
    ProductInput:
      example:
        price: 2000
        name: MacBook Pro M3
        category: Electronics
      properties:
        name:
          example: MacBook Pro M3
          title: name
          type: string
        price:
          example: 2000
          title: price
          type: number
        category:
          example: Electronics
          title: category
          type: string
      required:
      - name
      - price
      title: ProductInput
      type: object
    SuccessResponse_ListProducts:
      example:
        data:
        - price: 1500
          name: Laptop Dell XPS
          id: 645a1b8e9d8f4c2a1b9e7d6c
          category: Electronics
        - price: 1500
          name: Laptop Dell XPS
          id: 645a1b8e9d8f4c2a1b9e7d6c
          category: Electronics
        success: true
        message: Lấy danh sách thành công
      properties:
        success:
          example: true
          title: success
          type: boolean
        message:
          example: Lấy danh sách thành công
          title: message
          type: string
        data:
          items:
            $ref: "#/components/schemas/Product"
          title: data
          type: array
      title: SuccessResponse_ListProducts
      type: object
    SuccessResponse_SingleProduct:
      example:
        data:
          price: 1500
          name: Laptop Dell XPS
          id: 645a1b8e9d8f4c2a1b9e7d6c
          category: Electronics
        success: true
        message: Thao tác thành công
      properties:
        success:
          example: true
          title: success
          type: boolean
        message:
          example: Thao tác thành công
          title: message
          type: string
        data:
          $ref: "#/components/schemas/Product"
      title: SuccessResponse_SingleProduct
      type: object
    SuccessResponse_DeletedProduct:
      example:
        data:
          id: 645a1b8e9d8f4c2a1b9e7d6c
        success: true
        message: Xóa sản phẩm thành công
      properties:
        success:
          example: true
          title: success
          type: boolean
        message:
          example: Xóa sản phẩm thành công
          title: message
          type: string
        data:
          $ref: "#/components/schemas/SuccessResponse_DeletedProduct_data"
      title: SuccessResponse_DeletedProduct
      type: object
    ErrorResponse:
      example:
        success: false
        message: Lỗi hoặc không tìm thấy
        error: ""
      properties:
        success:
          example: false
          title: success
          type: boolean
        message:
          example: Lỗi hoặc không tìm thấy
          title: message
          type: string
        error:
          nullable: true
          title: error
          example: null
      title: ErrorResponse
      type: object
    SuccessResponse_DeletedProduct_data:
      example:
        id: 645a1b8e9d8f4c2a1b9e7d6c
      properties:
        id:
          example: 645a1b8e9d8f4c2a1b9e7d6c
          title: id
          type: string
      title: SuccessResponse_DeletedProduct_data
      type: object
