openapi: 3.0.0
info:
  title: Library Management API
  version: 1.0.0
  description: API chuẩn hóa cho hệ thống quản lý thư viện - Buổi 5 SOA

paths:
  /books:
    get:
      tags: [Books]
      summary: Danh sách sách (Offset Pagination)
      parameters:
        - name: q
          in: query
          schema: {type: string}
        - name: page
          in: query
          schema: {type: integer, default: 1}
        - name: limit
          in: query
          schema: {type: integer, default: 10}
      responses:
        200:
          $ref: '#/components/responses/StandardResponse'

  /readers:
    get:
      tags: [Readers]
      summary: Danh sách độc giả (Offset Pagination)
      parameters:
        - name: page
          in: query
          schema: {type: integer, default: 1}
        - name: limit
          in: query
          schema: {type: integer, default: 10}
      responses:
        200:
          $ref: '#/components/responses/StandardResponse'

  /readers/{reader_id}/borrows:
    get:
      tags: [Borrow Records]
      summary: Lịch sử mượn sách của độc giả (Cursor Pagination)
      parameters:
        - name: reader_id
          in: path
          required: true
          schema: {type: integer}
        - name: after_id
          in: query
          schema: {type: integer, default: 0}
        - name: limit
          in: query
          schema: {type: integer, default: 10}
      responses:
        200:
          $ref: '#/components/responses/StandardResponse'
        404:
          description: Không tìm thấy độc giả

components:
  responses:
    StandardResponse:
      description: Phản hồi chuẩn hóa
      content:
        application/json:
          schema:
            type: object
            properties:
              status: {type: string, example: "success"}
              data: {type: array, items: {type: object}}
              meta: {type: object}